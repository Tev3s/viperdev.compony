<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBell v17.0 - Premium Clean Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc; /* Latar belakang terang yang lembut */
            color: #0f172a;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            overflow-x: hidden;
        }
        
        .font-mono-custom { font-family: 'JetBrains Mono', monospace; letter-spacing: -0.05em; }
        .blink { animation: blinker 1s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes blinker { 50% { opacity: 0.15; } }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .playing-wave { animation: wave 0.8s infinite ease-in-out alternate; }
        @keyframes wave { 0% { transform: scaleY(0.3); opacity: 0.5; } 100% { transform: scaleY(1.2); opacity: 1; } }

        /* Premium Sliders */
        input[type=range] {
            -webkit-appearance: none; background: #e2e8f0; border-radius: 8px; height: 6px; width: 100%;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%;
            background: #3b82f6; cursor: pointer; box-shadow: 0 0 10px rgba(59, 130, 246, 0.4);
            transition: transform 0.2s ease;
        }
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }

        /* Custom Select */
        select {
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 1rem center; background-size: 1em;
        }

        /* Checkboxes Active State */
        .day-cb:checked + div {
            background-color: #3b82f6; color: white; border-color: #3b82f6;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
            font-weight: 800;
        }

        /* Cards */
        .premium-card {
            background: #ffffff;
            border: 1px solid rgba(226, 232, 240, 0.8);
            border-radius: 2rem;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.05);
        }

        .smooth-input {
            background: #f8fafc; border: 1px solid #e2e8f0; transition: all 0.3s ease;
        }
        .smooth-input:focus {
            background: #ffffff; border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        /* Logo Hover Effect */
        .logo-container:hover .logo-overlay { opacity: 1; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col p-2 lg:p-6 lg:gap-6 overflow-hidden bg-slate-50">

    <!-- ================= NAVBAR ================= -->
    <header class="premium-card px-6 py-4 flex flex-col lg:flex-row justify-between items-center gap-4 shrink-0 z-20 mx-2 lg:mx-0 mt-2 lg:mt-0">
        
        <!-- Logo & Title Section -->
        <div class="flex items-center gap-4 w-full lg:w-auto">
            <!-- Upload Input (Hidden) -->
            <input type="file" id="logo-upload" class="hidden" accept="image/*" onchange="handleLogoUpload(event)">
            
            <!-- Clickable Logo -->
            <div class="relative w-14 h-14 rounded-2xl bg-slate-100 flex items-center justify-center cursor-pointer border border-slate-200 shadow-sm overflow-hidden logo-container shrink-0" onclick="document.getElementById('logo-upload').click()" title="Klik untuk ubah logo">
                <img id="school-logo" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2394a3b8'><path d='M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3zm6.82 6L12 12.72 5.18 9 12 5.28 18.82 9zM17 15.99l-5 2.73-5-2.73v-3.72l5 2.73 5-2.73v3.72z'/></svg>" alt="Logo Sekolah" class="w-full h-full object-cover">
                <div class="logo-overlay absolute inset-0 bg-black/50 opacity-0 transition-opacity flex items-center justify-center">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </div>
            </div>
            
            <div>
                <h1 class="text-2xl font-extrabold tracking-tight text-slate-800 leading-none">SmartBell</h1>
                <p class="text-blue-600 text-[10px] font-black uppercase tracking-widest mt-1">Sistem Siar Raya Pintar</p>
            </div>
        </div>

        <!-- Global Audio Settings -->
        <div class="flex flex-col md:flex-row items-center gap-4 w-full lg:w-auto bg-slate-50/50 p-2 lg:p-0 lg:bg-transparent rounded-2xl">
            <div class="w-full md:w-48 flex flex-col gap-1.5 px-2">
                <label class="text-slate-500 text-[10px] font-bold uppercase tracking-widest flex justify-between">
                    <span>Volume</span><span id="vol-val" class="text-blue-600 font-black">80%</span>
                </label>
                <input type="range" id="volume-slider" min="0" max="100" value="80">
            </div>
            <div class="w-full md:w-auto flex gap-2">
                <select id="voice-id-select" class="w-full md:w-40 smooth-input rounded-xl px-3 py-2 text-xs font-bold text-slate-700 outline-none" title="Suara Indonesia"></select>
                <select id="voice-en-select" class="w-full md:w-40 smooth-input rounded-xl px-3 py-2 text-xs font-bold text-slate-700 outline-none" title="Suara English"></select>
            </div>
            <button onclick="toggleFullScreen()" class="hidden lg:block p-3 bg-white hover:bg-slate-50 rounded-xl text-slate-400 hover:text-slate-600 transition border border-slate-200 shadow-sm ml-2" title="Layar Penuh">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
            </button>
        </div>
    </header>

    <!-- ================= MAIN CONTENT ================= -->
    <main class="grid grid-cols-1 lg:grid-cols-12 gap-6 flex-grow min-h-0 overflow-y-auto lg:overflow-hidden p-2 lg:p-0">
        
        <!-- KOLOM KIRI (Clock & Status) -->
        <div class="col-span-1 lg:col-span-4 flex flex-col gap-6">
            
            <!-- Dashboard Jam -->
            <div class="premium-card p-8 flex flex-col items-center justify-center text-center relative bg-gradient-to-b from-white to-blue-50/30 overflow-hidden shrink-0">
                <div id="playing-indicator" class="hidden absolute top-6 right-6 flex items-end gap-1.5 h-4">
                    <div class="w-1.5 bg-blue-500 rounded-t-full playing-wave" style="animation-delay: 0s"></div>
                    <div class="w-1.5 bg-blue-500 rounded-t-full playing-wave" style="animation-delay: 0.2s"></div>
                    <div class="w-1.5 bg-blue-500 rounded-t-full playing-wave" style="animation-delay: 0.1s"></div>
                </div>
                <span id="current-day-display" class="text-blue-600 text-[10px] font-black uppercase tracking-[0.3em] mb-3 bg-blue-50 px-4 py-1.5 rounded-full border border-blue-100 shadow-sm">HARI INI</span>
                <div class="text-6xl xl:text-7xl font-mono-custom text-slate-800 font-extrabold tracking-tighter mb-4" id="current-time">
                    00<span class="blink text-slate-300">:</span>00
                </div>
            </div>

            <!-- Bel Berikutnya -->
            <div class="premium-card p-6 bg-blue-600 border-none shadow-xl shadow-blue-600/20 text-white relative overflow-hidden shrink-0">
                <div class="absolute -right-8 -bottom-8 opacity-10">
                    <svg class="w-48 h-48" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a6 6 0 00-6 6v3.586l-.707.707A1 1 0 004 14h12a1 1 0 00.707-1.707L16 11.586V8a6 6 0 00-6-6zM10 18a3 3 0 01-3-3h6a3 3 0 01-3 3z"/></svg>
                </div>
                <p class="text-blue-200 text-[10px] font-bold uppercase tracking-widest mb-3 flex items-center gap-2 relative z-10">
                    <span class="w-2 h-2 rounded-full bg-white animate-pulse"></span> Bel Selanjutnya
                </p>
                <div class="text-white font-black text-4xl mb-1 font-mono-custom relative z-10" id="next-bell-time">--:--</div>
                <div class="text-blue-100 text-sm font-medium line-clamp-2 mb-6 h-10 relative z-10" id="next-bell-desc">Sistem belum diaktifkan.</div>
                
                <div class="mt-auto relative z-10">
                    <div class="flex justify-between items-end mb-2.5">
                        <span class="text-blue-200 text-[10px] font-bold uppercase tracking-widest">Hitung Mundur</span>
                        <span class="text-blue-700 text-[10px] font-black uppercase bg-white px-3 py-1.5 rounded-lg shadow-sm" id="next-bell-countdown">OFFLINE</span>
                    </div>
                    <div class="w-full h-2 bg-blue-900/30 rounded-full overflow-hidden">
                        <div id="countdown-progress" class="h-full bg-white transition-all duration-1000" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <!-- Tombol Utama -->
            <div class="mt-auto flex flex-col gap-3 shrink-0 pb-4 lg:pb-0">
                <button id="btn-toggle-system" onclick="toggleSystem()" class="w-full py-5 rounded-[1.5rem] font-black text-xs lg:text-sm uppercase tracking-widest text-white bg-blue-600 hover:bg-blue-700 shadow-lg shadow-blue-600/30 transition-all active:scale-95 flex justify-center items-center gap-3">
                    <span id="btn-icon" class="bg-white/20 p-1.5 rounded-lg"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z"/></svg></span>
                    <span id="btn-text">AKTIFKAN SISTEM</span>
                </button>
                <button id="btn-stop-audio" onclick="stopCurrentAudio()" class="hidden w-full py-4 rounded-xl font-bold text-[10px] uppercase tracking-widest text-rose-500 bg-white border border-rose-200 hover:bg-rose-50 transition-all flex justify-center items-center gap-2 shadow-sm">
                    ⏹ Batalkan Suara Berjalan
                </button>
            </div>
        </div>

        <!-- KOLOM KANAN (Akses Cepat, Form, List) -->
        <div class="col-span-1 lg:col-span-8 flex flex-col gap-6 overflow-y-auto pr-1 pb-6 lg:pb-0">
            
            <!-- Quick Access Bar -->
            <div class="premium-card p-5 flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4 shrink-0 overflow-hidden">
                <div class="flex items-center gap-2 overflow-x-auto w-full pb-2 lg:pb-0 scroll-smooth">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-2 shrink-0">Mainkan:</span>
                    <button onclick="playInstantBell('upacara')" class="shrink-0 px-4 py-2 bg-rose-50 text-rose-600 hover:bg-rose-600 hover:text-white rounded-xl text-[11px] font-bold transition border border-rose-100 shadow-sm flex items-center gap-1.5">🇲🇨 Upacara</button>
                    <button onclick="playInstantBell('apel')" class="shrink-0 px-4 py-2 bg-orange-50 text-orange-600 hover:bg-orange-600 hover:text-white rounded-xl text-[11px] font-bold transition border border-orange-100 shadow-sm flex items-center gap-1.5">📢 Apel</button>
                    <button onclick="playInstantBell('masuk')" class="shrink-0 px-4 py-2 bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white rounded-xl text-[11px] font-bold transition border border-blue-100 shadow-sm flex items-center gap-1.5">🏫 Masuk</button>
                    <button onclick="playInstantBell('istirahat')" class="shrink-0 px-4 py-2 bg-amber-50 text-amber-600 hover:bg-amber-500 hover:text-white rounded-xl text-[11px] font-bold transition border border-amber-100 shadow-sm flex items-center gap-1.5">☕ Rehat</button>
                    <button onclick="playInstantBell('pulang')" class="shrink-0 px-4 py-2 bg-slate-50 text-slate-600 hover:bg-slate-700 hover:text-white rounded-xl text-[11px] font-bold transition border border-slate-200 shadow-sm flex items-center gap-1.5">🏠 Pulang</button>
                    
                    <div class="w-px h-6 bg-slate-200 mx-1 hidden lg:block shrink-0"></div>
                    
                    <!-- Panggilan Piket Restored -->
                    <button onclick="openCallModal()" class="shrink-0 px-4 py-2 bg-indigo-50 text-indigo-600 hover:bg-indigo-600 hover:text-white rounded-xl text-[11px] font-bold transition border border-indigo-200 shadow-sm flex items-center gap-1.5 ml-auto lg:ml-0">
                        🎙️ Panggilan
                    </button>
                </div>
            </div>

            <!-- Add Schedule Form -->
            <div class="premium-card p-6 lg:p-8 flex flex-col shrink-0" id="form-container">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4 border-b border-slate-100 pb-4">
                    <h3 id="form-title" class="text-lg font-black text-slate-800 flex items-center gap-2">
                        <span class="p-1.5 bg-blue-100 text-blue-600 rounded-lg"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg></span>
                        Buat Jadwal Baru
                    </h3>
                </div>

                <div class="flex flex-col lg:flex-row gap-6">
                    <!-- Time Selector -->
                    <div class="w-full lg:w-48 shrink-0 flex flex-col justify-start">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Waktu Bel</label>
                        <div class="flex items-center justify-center gap-2 bg-slate-50 p-3 rounded-2xl border border-slate-200">
                            <select id="hour-select" class="w-full bg-white border border-slate-200 rounded-xl py-2.5 text-center text-2xl font-black text-slate-800 font-mono-custom outline-none shadow-sm focus:ring-2 focus:ring-blue-500"></select>
                            <span class="text-slate-400 font-black text-2xl">:</span>
                            <select id="minute-select" class="w-full bg-white border border-slate-200 rounded-xl py-2.5 text-center text-2xl font-black text-slate-800 font-mono-custom outline-none shadow-sm focus:ring-2 focus:ring-blue-500"></select>
                        </div>
                    </div>

                    <!-- Texts & Days -->
                    <div class="flex-grow flex flex-col gap-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <!-- Text ID -->
                            <div class="flex flex-col h-full relative group">
                                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1.5 flex justify-between items-center px-1">
                                    <span>Teks Indonesia 🇮🇩</span>
                                </label>
                                <textarea id="input-text-id" rows="2" class="w-full h-full smooth-input rounded-2xl p-4 text-xs font-medium text-slate-700 outline-none resize-none placeholder-slate-400" placeholder="Ketik pengumuman di sini..."></textarea>
                            </div>
                            
                            <!-- Text EN + TRANSLATE AI -->
                            <div class="flex flex-col h-full relative group">
                                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1.5 flex justify-between items-center px-1">
                                    <span>Teks English 🇬🇧</span>
                                    <button id="btn-translate" onclick="autoTranslateToEnglish()" class="text-[9px] font-bold text-indigo-600 hover:text-white bg-indigo-50 hover:bg-indigo-600 px-2 py-1 rounded transition border border-indigo-100 flex items-center gap-1 shadow-sm">
                                        ✨ Translate AI
                                    </button>
                                </label>
                                <textarea id="input-text-en" rows="2" class="w-full h-full smooth-input rounded-2xl p-4 text-xs font-medium text-slate-700 outline-none resize-none placeholder-slate-400" placeholder="Terjemahan (Boleh Kosong)..."></textarea>
                            </div>
                        </div>

                        <!-- Days Checkboxes & Save -->
                        <div class="flex flex-col md:flex-row gap-4 items-center mt-2">
                            <div class="flex flex-wrap gap-1.5 flex-grow w-full bg-slate-50 p-1.5 rounded-xl border border-slate-200">
                                <label class="cursor-pointer flex-1"><input type="checkbox" value="1" class="day-cb peer sr-only" checked><div class="py-2.5 rounded-lg text-[10px] font-bold text-center text-slate-500 border border-transparent peer-checked:bg-blue-600 peer-checked:text-white transition">SEN</div></label>
                                <label class="cursor-pointer flex-1"><input type="checkbox" value="2" class="day-cb peer sr-only" checked><div class="py-2.5 rounded-lg text-[10px] font-bold text-center text-slate-500 border border-transparent peer-checked:bg-blue-600 peer-checked:text-white transition">SEL</div></label>
                                <label class="cursor-pointer flex-1"><input type="checkbox" value="3" class="day-cb peer sr-only" checked><div class="py-2.5 rounded-lg text-[10px] font-bold text-center text-slate-500 border border-transparent peer-checked:bg-blue-600 peer-checked:text-white transition">RAB</div></label>
                                <label class="cursor-pointer flex-1"><input type="checkbox" value="4" class="day-cb peer sr-only" checked><div class="py-2.5 rounded-xl text-[10px] font-bold text-center text-slate-500 border border-transparent peer-checked:bg-blue-600 peer-checked:text-white transition">KAM</div></label>
                                <label class="cursor-pointer flex-1"><input type="checkbox" value="5" class="day-cb peer sr-only" checked><div class="py-2.5 rounded-lg text-[10px] font-bold text-center text-slate-500 border border-transparent peer-checked:bg-blue-600 peer-checked:text-white transition">JUM</div></label>
                                <label class="cursor-pointer flex-1"><input type="checkbox" value="6" class="day-cb peer sr-only"><div class="py-2.5 rounded-lg text-[10px] font-bold text-center text-slate-500 border border-transparent peer-checked:bg-slate-700 peer-checked:text-white transition">SAB</div></label>
                                <label class="cursor-pointer flex-1"><input type="checkbox" value="0" class="day-cb peer sr-only"><div class="py-2.5 rounded-lg text-[10px] font-bold text-center text-slate-500 border border-transparent peer-checked:bg-rose-500 peer-checked:text-white transition text-rose-500">MIN</div></label>
                            </div>
                            <div class="flex gap-2 w-full md:w-auto shrink-0">
                                <button id="btn-cancel-edit" onclick="cancelEdit()" class="hidden px-5 py-3 rounded-xl bg-slate-100 text-slate-500 font-bold text-[11px] hover:bg-slate-200 transition uppercase">Batal</button>
                                <button id="btn-save-schedule" onclick="saveSchedule()" class="w-full md:w-auto px-8 py-3 bg-blue-600 text-white font-black text-[11px] rounded-xl shadow-md shadow-blue-500/30 hover:bg-blue-700 transition active:scale-95 uppercase tracking-widest">Simpan Jadwal</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Schedule List -->
            <div class="premium-card p-6 lg:p-8 flex-grow flex flex-col overflow-hidden">
                <div class="flex justify-between items-end mb-4 pb-4 border-b border-slate-100 shrink-0">
                    <div>
                        <h3 class="text-base font-black text-slate-800 flex items-center gap-2 tracking-tight">
                            Jadwal Tersimpan
                            <span id="total-sched" class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded-md text-[10px] font-black">0</span>
                        </h3>
                    </div>
                    <button onclick="confirmReset()" class="text-[9px] font-bold text-rose-500 hover:text-white bg-white hover:bg-rose-500 px-3 py-1.5 rounded-lg transition border border-rose-200 uppercase tracking-widest shadow-sm">
                        Reset Data
                    </button>
                </div>
                
                <div class="flex-grow overflow-y-auto pr-2 pb-1" id="schedule-scroll-area">
                    <div id="schedule-list" class="grid grid-cols-1 gap-3">
                        <!-- Cards injected by JS -->
                    </div>
                    
                    <!-- Empty State -->
                    <div id="empty-state" class="hidden flex-col items-center justify-center py-12 text-slate-400 bg-slate-50 rounded-2xl border-2 border-slate-200 border-dashed">
                        <svg class="w-12 h-12 mb-3 opacity-30 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        <p class="text-xs font-bold uppercase tracking-widest">Belum ada jadwal.</p>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Modal (Panggilan Khusus) RESTORED -->
    <div id="call-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 pointer-events-none transition-all duration-300 p-4">
        <div class="bg-white border border-slate-200 rounded-[2rem] p-8 max-w-md w-full shadow-2xl transform scale-95 transition-transform duration-300">
            <div class="flex items-center gap-4 mb-6">
                <div class="w-12 h-12 rounded-2xl bg-indigo-50 text-indigo-600 flex items-center justify-center shadow-inner border border-indigo-100 shrink-0">
                    <span class="text-2xl">🎙️</span>
                </div>
                <div>
                    <h3 class="text-xl font-extrabold text-slate-900 tracking-tight">Panggilan Khusus</h3>
                    <p class="text-indigo-600 text-[10px] font-bold uppercase tracking-widest">Pusat Informasi</p>
                </div>
            </div>
            
            <div class="space-y-4 mb-6">
                <div>
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1.5 ml-1">Panggil Kepada</label>
                    <div class="flex gap-2">
                        <select id="call-role" class="smooth-input rounded-xl px-3 py-3 text-xs font-bold text-slate-700 outline-none w-[110px] shrink-0">
                            <option value="siswa">Siswa/i</option>
                            <option value="guru">Guru</option>
                            <option value="staf">Staf/TU</option>
                        </select>
                        <input type="text" id="call-name" placeholder="Nama Lengkap..." class="w-full smooth-input rounded-xl px-4 py-3 text-xs font-medium text-slate-700 outline-none placeholder-slate-400">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1.5 ml-1">Menuju Ke Lokasi</label>
                    <select id="call-location" class="w-full smooth-input rounded-xl px-4 py-3 text-xs font-bold text-slate-700 outline-none">
                        <option value="Meja Piket">Meja Piket / Pos Jaga</option>
                        <option value="Ruang Tata Usaha">Ruang Tata Usaha (TU)</option>
                        <option value="Ruang Kepala Sekolah">Ruang Kepala Sekolah</option>
                        <option value="Ruang Guru">Ruang Majelis Guru</option>
                        <option value="Ruang Bimbingan Konseling">Ruang BK</option>
                        <option value="Perpustakaan">Perpustakaan</option>
                        <option value="UKS">UKS / Unit Kesehatan</option>
                    </select>
                </div>
            </div>
            
            <div class="flex gap-2 justify-end mt-4 pt-4 border-t border-slate-100">
                <button onclick="closeCallModal()" class="px-5 py-2.5 text-xs font-bold text-slate-500 bg-slate-100 rounded-xl hover:bg-slate-200 transition">Batal</button>
                <button onclick="executeCall()" class="px-6 py-2.5 text-xs font-bold text-white bg-indigo-600 rounded-xl shadow-md hover:bg-indigo-700 transition flex items-center gap-2">🔊 Buat Panggilan</button>
            </div>
        </div>
    </div>

    <!-- Modals (Information) -->
    <div id="custom-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 pointer-events-none transition-all duration-300 p-4">
        <div class="bg-white border border-slate-200 rounded-[2rem] p-8 max-w-sm w-full shadow-2xl transform scale-95 transition-transform duration-300 text-center">
            <h3 id="modal-title" class="text-xl font-extrabold text-slate-900 mb-2 tracking-tight">Pemberitahuan</h3>
            <p id="modal-message" class="text-slate-500 text-xs mb-8 leading-relaxed font-medium"></p>
            <div class="flex gap-2 justify-center" id="modal-actions"></div>
        </div>
    </div>

    <script>
        const apiKey = ""; 
        const hariIndo = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
        const hariSingkat = ["MIN", "SEN", "SEL", "RAB", "KAM", "JUM", "SAB"];
        
        let savedData = localStorage.getItem('SmartBell_V17_Final');
        let schedules = savedData ? JSON.parse(savedData) : [
            { id: 1, time: "07:00", textId: "Perhatian, jam pelajaran pertama segera dimulai. Kepada seluruh siswa, silakan masuk ke dalam kelas.", textEn: "Attention please. The first period is about to begin.", days: [1,2,3,4,5] },
            { id: 2, time: "10:00", textId: "Perhatian, waktu istirahat telah tiba. Selamat beristirahat.", textEn: "Attention please. Break time has arrived.", days: [1,2,3,4,5] }
        ];

        let systemActive = false;
        let audioCtx = null;
        let isPlayingSequence = false;
        let editingId = null;
        let masterVolume = 0.8;
        let lastPlayedMinute = "";
        let pendingTimeouts = [];
        let activeOscillators = [];
        
        window.activeUtterances = []; 
        let audioUnlocked = false;

        // --- MANAJEMEN LOGO CUSTOM ---
        function loadCustomLogo() {
            const savedLogo = localStorage.getItem('SmartBell_Logo');
            if(savedLogo) {
                document.getElementById('school-logo').src = savedLogo;
            }
        }

        function handleLogoUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const dataUrl = e.target.result;
                    document.getElementById('school-logo').src = dataUrl;
                    localStorage.setItem('SmartBell_Logo', dataUrl);
                }
                reader.readAsDataURL(file);
            }
        }

        function unlockAudioSystems() {
            if (audioUnlocked) return;
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            let silentMsg = new SpeechSynthesisUtterance('a');
            silentMsg.volume = 0; silentMsg.rate = 10;
            silentMsg.onerror = function() {}; 
            window.speechSynthesis.speak(silentMsg);
            
            audioUnlocked = true;
            document.body.removeEventListener('click', unlockAudioSystems);
            document.body.removeEventListener('touchstart', unlockAudioSystems);
        }

        document.body.addEventListener('click', unlockAudioSystems);
        document.body.addEventListener('touchstart', unlockAudioSystems);

        function initUI() {
            const hSel = document.getElementById('hour-select');
            const mSel = document.getElementById('minute-select');
            for(let i=0; i<24; i++) hSel.add(new Option(i.toString().padStart(2, '0'), i.toString().padStart(2, '0')));
            for(let i=0; i<60; i++) mSel.add(new Option(i.toString().padStart(2, '0'), i.toString().padStart(2, '0')));
            
            hSel.value = String(new Date().getHours()).padStart(2, '0');
            mSel.value = "00";

            document.getElementById('volume-slider').addEventListener('input', (e) => {
                masterVolume = e.target.value / 100;
                document.getElementById('vol-val').innerText = `${e.target.value}%`;
            });
            
            loadCustomLogo();
        }

        // --- SISTEM SUARA DENGAN PRIORITAS INDONESIA ---
        function loadVoices() {
            const v = window.speechSynthesis.getVoices();
            if (!v || v.length === 0) return;

            const sid = document.getElementById('voice-id-select');
            const sen = document.getElementById('voice-en-select');
            
            const currId = localStorage.getItem('SmartBell_V17_VoiceID');
            const currEn = localStorage.getItem('SmartBell_V17_VoiceEN');

            sid.innerHTML = ''; sen.innerHTML = '';

            let idVoices = [];
            let enVoices = [];

            v.forEach(voice => {
                const lang = voice.lang.toLowerCase();
                const vname = voice.name.toLowerCase();
                if (lang.includes('id') || lang.includes('in') || lang.includes('ms') || vname.includes('indonesia') || vname.includes('melayu')) {
                    idVoices.push(voice);
                } else if (lang.includes('en')) {
                    enVoices.push(voice);
                }
            });

            // Populate ID Select
            if (idVoices.length > 0) {
                idVoices.forEach(voice => sid.add(new Option(`${voice.name} (${voice.lang})`, voice.name)));
            } else {
                sid.add(new Option("⚠️ Tidak ada Suara Indonesia", ""));
            }

            // Populate EN Select
            if (enVoices.length > 0) {
                enVoices.forEach(voice => sen.add(new Option(`${voice.name} (${voice.lang})`, voice.name)));
            } else {
                sen.add(new Option("⚠️ Tidak ada Suara English", ""));
            }

            // Set Default Indonesia
            if (currId && Array.from(sid.options).some(o => o.value === currId)) {
                sid.value = currId;
            } else if (idVoices.length > 0) {
                const defaultIdVoice = Array.from(sid.options).find(opt => opt.text.toLowerCase().includes('indonesia') || opt.text.toLowerCase().includes('id'));
                if (defaultIdVoice) sid.value = defaultIdVoice.value;
            }

            // Set Default English
            if (currEn && Array.from(sen.options).some(o => o.value === currEn)) {
                sen.value = currEn;
            } else if (enVoices.length > 0) {
                const googleEn = Array.from(sen.options).find(o => o.text.toLowerCase().includes('google'));
                if (googleEn) sen.value = googleEn.value;
            }

            sid.addEventListener('change', (e) => localStorage.setItem('SmartBell_V17_VoiceID', e.target.value));
            sen.addEventListener('change', (e) => localStorage.setItem('SmartBell_V17_VoiceEN', e.target.value));
        }

        // --- SISTEM AUDIO (NADA BEL PREMIUM & TTS) ---
        function clearAllTimeouts() {
            pendingTimeouts.forEach(t => clearTimeout(t));
            pendingTimeouts = [];
        }

        function stopCurrentAudio() {
            clearAllTimeouts();
            isPlayingSequence = false;
            activeOscillators.forEach(osc => { try { osc.stop(); } catch(e){} });
            activeOscillators = [];
            
            if (window.speechSynthesis.speaking || window.speechSynthesis.pending) {
                window.speechSynthesis.cancel();
            }
            window.activeUtterances = []; 
            setPlayingState(false);
        }

        function setPlayingState(playing) {
            const ind = document.getElementById('playing-indicator');
            const btn = document.getElementById('btn-stop-audio');
            if(playing) { 
                if(ind) ind.classList.remove('hidden'); 
                if(btn) btn.classList.remove('hidden'); 
            } else { 
                if(ind) ind.classList.add('hidden'); 
                if(btn) btn.classList.add('hidden'); 
            }
        }

        function playPremiumBellNote(baseFreq, start, dur) {
            if(!audioCtx) return;
            
            const harmonics = [
                { ratio: 1.0,  amp: 1.0,   decay: 1.0 },   
                { ratio: 1.2,  amp: 0.6,   decay: 0.8 },   
                { ratio: 1.5,  amp: 0.4,   decay: 0.7 },   
                { ratio: 2.0,  amp: 0.5,   decay: 0.6 },   
                { ratio: 2.76, amp: 0.3,   decay: 0.4 },   
                { ratio: 3.0,  amp: 0.2,   decay: 0.3 },   
                { ratio: 4.2,  amp: 0.1,   decay: 0.2 }    
            ];

            harmonics.forEach(h => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(baseFreq * h.ratio, start);
                
                const peakVol = 0.35 * masterVolume * h.amp;
                const actualDur = dur * h.decay; 
                
                gain.gain.setValueAtTime(0, start);
                gain.gain.linearRampToValueAtTime(peakVol, start + 0.08); 
                gain.gain.exponentialRampToValueAtTime(0.001, start + actualDur); 
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start(start);
                osc.stop(start + actualDur + 0.1);
                activeOscillators.push(osc);
            });
        }

        function playChime(type, callback) {
            unlockAudioSystems();
            if(!audioCtx) { if(callback) callback(); return; }
            
            const now = audioCtx.currentTime;
            
            let seq = type === 'start' ? 
                [{f:659.25, t:0}, {f:523.25, t:1.0}, {f:587.33, t:2.0}, {f:392, t:3.0}] :
                [{f:392, t:0}, {f:587.33, t:1.0}, {f:659.25, t:2.0}, {f:523.25, t:3.0}];

            seq.forEach(n => playPremiumBellNote(n.f, now + n.t, n.t === 3.0 ? 6.0 : 3.0));
            
            let t = setTimeout(() => { if(isPlayingSequence && callback) callback(); }, 6500);
            pendingTimeouts.push(t);
        }

        function speakSingleText(text, langType, callback) {
            if (!text || text.trim() === '') { 
                if(isPlayingSequence && callback) callback(); 
                return; 
            }
            if (!isPlayingSequence) return;

            const cleanText = text.replace(/[*_~`#\[\]{}()<>|\\]/g, '');
            if (window.speechSynthesis.paused) window.speechSynthesis.resume();
            
            const msg = new SpeechSynthesisUtterance(cleanText);
            window.activeUtterances.push(msg);

            const selectId = langType === 'id' ? 'voice-id-select' : 'voice-en-select';
            const selectEl = document.getElementById(selectId);
            const vName = selectEl ? selectEl.value : "";
            const voices = window.speechSynthesis.getVoices();
            const selectedVoice = voices.find(v => v.name === vName);

            if(selectedVoice) { msg.voice = selectedVoice; msg.lang = selectedVoice.lang; }
            else { msg.lang = langType === 'id' ? 'id-ID' : 'en-US'; }

            msg.rate = 0.85; msg.pitch = 1; msg.volume = masterVolume;
            let hasRetried = false;

            msg.onend = () => { 
                window.activeUtterances = window.activeUtterances.filter(item => item !== msg);
                if(isPlayingSequence && callback) callback(); 
            };
            
            msg.onerror = (e) => { 
                window.activeUtterances = window.activeUtterances.filter(item => item !== msg);
                if (e.error === 'synthesis-failed' && !hasRetried) {
                    hasRetried = true;
                    let retryMsg = new SpeechSynthesisUtterance(cleanText);
                    retryMsg.lang = langType === 'id' ? 'id-ID' : 'en-US';
                    retryMsg.volume = masterVolume;
                    window.activeUtterances.push(retryMsg);
                    retryMsg.onend = () => { 
                        window.activeUtterances = window.activeUtterances.filter(item => item !== retryMsg);
                        if(isPlayingSequence && callback) callback(); 
                    };
                    retryMsg.onerror = () => { 
                        window.activeUtterances = window.activeUtterances.filter(item => item !== retryMsg);
                        if(isPlayingSequence && callback) callback(); 
                    };
                    window.speechSynthesis.speak(retryMsg);
                } else {
                    if(isPlayingSequence && callback) callback(); 
                }
            };

            window.speechSynthesis.speak(msg);
        }

        function playAnnouncementSequence(tId, tEn) {
            stopCurrentAudio();
            isPlayingSequence = true;
            setPlayingState(true);
            
            let wakeMsg = new SpeechSynthesisUtterance('');
            wakeMsg.volume = 0;
            window.speechSynthesis.speak(wakeMsg);

            playChime('start', () => {
                if(!isPlayingSequence) return;
                speakSingleText(tId, 'id', () => {
                    if(!isPlayingSequence) return;
                    let t1 = setTimeout(() => {
                        if(!isPlayingSequence) return;
                        speakSingleText(tEn, 'en', () => {
                            if(!isPlayingSequence) return;
                            let t2 = setTimeout(() => {
                                if(!isPlayingSequence) return;
                                playChime('end', () => {
                                    isPlayingSequence = false;
                                    setPlayingState(false);
                                    updateNextBellDisplay();
                                });
                            }, 500);
                            pendingTimeouts.push(t2);
                        });
                    }, 500);
                    pendingTimeouts.push(t1);
                });
            });
        }

        // --- SISTEM UTAMA (TOGGLE) ---
        function toggleSystem() {
            unlockAudioSystems();
            const btn = document.getElementById('btn-toggle-system');
            const icon = document.getElementById('btn-icon');
            const text = document.getElementById('btn-text');

            if (!systemActive) {
                systemActive = true;
                icon.innerHTML = `<span class="flex h-4 w-4 relative"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-300 opacity-75"></span><span class="relative inline-flex rounded-full h-4 w-4 bg-white"></span></span>`;
                text.innerText = "SISTEM AKTIF: MATIKAN";
                btn.classList.replace('bg-blue-600', 'bg-slate-800');
                btn.classList.replace('hover:bg-blue-700', 'hover:bg-slate-700');
                btn.classList.replace('shadow-blue-600/30', 'shadow-slate-800/30');
                
                isPlayingSequence = true;
                speakSingleText("Sistem bel cerdas diaktifkan.", "id", () => { isPlayingSequence = false; });
            } else {
                systemActive = false;
                stopCurrentAudio();
                icon.innerHTML = `<span class="bg-white/20 p-1.5 rounded-lg"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z"/></svg></span>`;
                text.innerText = "AKTIFKAN SISTEM";
                btn.classList.replace('bg-slate-800', 'bg-blue-600');
                btn.classList.replace('hover:bg-slate-700', 'hover:bg-blue-700');
                btn.classList.replace('shadow-slate-800/30', 'shadow-blue-600/30');
            }
            updateNextBellDisplay();
        }

        function updateClock() {
            const now = new Date();
            let h = String(now.getHours()).padStart(2, '0');
            let m = String(now.getMinutes()).padStart(2, '0');
            let s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('current-time').innerHTML = `${h}<span class="blink text-slate-300">:</span>${m}`;
            
            if (systemActive) {
                const dayIdx = now.getDay();
                const currentTime = h + ":" + m;
                if (s === '00' && currentTime !== lastPlayedMinute) {
                    const sched = schedules.find(s => s.time === currentTime && s.days.includes(dayIdx));
                    if (sched) {
                        lastPlayedMinute = currentTime;
                        playAnnouncementSequence(sched.textId, sched.textEn);
                    }
                    updateNextBellDisplay();
                }
            }
        }
        setInterval(updateClock, 1000);

        function updateNextBellDisplay() {
            const tEl = document.getElementById('next-bell-time'), 
                  dEl = document.getElementById('next-bell-desc'), 
                  cEl = document.getElementById('next-bell-countdown'), 
                  pEl = document.getElementById('countdown-progress');

            if (!systemActive) {
                if(tEl) tEl.innerText = "--:--"; 
                if(dEl) dEl.innerText = "Sistem Offline";
                if(cEl) { cEl.innerText = "TERHENTI"; cEl.className = "text-slate-500 text-[10px] font-black uppercase bg-white px-2.5 py-1 rounded shadow-sm inline-block"; }
                if(pEl) pEl.style.width = "0%";
                return;
            }

            const now = new Date();
            const currMins = now.getHours() * 60 + now.getMinutes();
            const dayIdx = now.getDay();
            let todayScheds = schedules.filter(s => s.days.includes(dayIdx));
            
            let next = null;
            let minDiff = 9999;
            todayScheds.forEach(s => {
                let [sh, sm] = s.time.split(':').map(Number);
                let sTotal = sh * 60 + sm;
                if (sTotal > currMins && (sTotal - currMins) < minDiff) { minDiff = sTotal - currMins; next = s; }
            });

            if (next) {
                if(tEl) tEl.innerText = next.time; 
                if(dEl) dEl.innerText = `"${next.textId}"`;
                if(cEl) { cEl.innerText = `${Math.floor(minDiff/60)}j ${minDiff%60}m LAGI`; cEl.className = "text-blue-600 text-[10px] font-black uppercase bg-white px-2.5 py-1 rounded shadow-sm inline-block"; }
                if(pEl) pEl.style.width = `${(1 - minDiff/1440) * 100}%`;
            } else {
                if(tEl) tEl.innerText = "--:--"; 
                if(dEl) dEl.innerText = "Tidak ada jadwal"; 
                if(cEl) { cEl.innerText = "ESOK"; cEl.className = "text-slate-500 text-[10px] font-black uppercase bg-white px-2.5 py-1 rounded shadow-sm inline-block"; }
                if(pEl) pEl.style.width = "0%";
            }
        }

        // --- MAINKAN INSTAN & PANGGILAN KHUSUS ---
        function playInstantBell(type) {
            let tid = "", ten = "";
            if(type === 'upacara') { tid = "Perhatian. Upacara bendera akan segera dimulai. Seluruh peserta upacara dimohon segera merapat ke lapangan."; ten = "Attention please. The flag ceremony is about to begin. All participants please gather at the field immediately."; }
            else if(type === 'apel') { tid = "Perhatian. Apel rutin akan segera dimulai. Seluruh siswa diharap segera berbaris di lapangan."; ten = "Attention please. The assembly is about to begin."; }
            else if(type === 'masuk') { tid = "Perhatian. Jam pelajaran akan segera dimulai. Seluruh siswa dipersilakan masuk ke ruangan kelas."; ten = "Attention please. The class will begin shortly. All students please proceed to your classrooms."; }
            else if(type === 'istirahat') { tid = "Perhatian. Waktu istirahat telah tiba. Selamat beristirahat."; ten = "Attention please. Break time has arrived. Have a good rest."; }
            else if(type === 'ibadah') { tid = "Perhatian. Waktu istirahat dan ibadah telah tiba. Kepada seluruh siswa Muslim disilakan menuju masjid."; ten = "Attention please. It is time for break and prayer."; }
            else if(type === 'pulang') { tid = "Perhatian. Seluruh kegiatan belajar mengajar hari ini telah selesai. Selamat pulang dan hati-hati di jalan."; ten = "Attention please. All learning activities for today have ended."; }
            
            showModal(`Membunyikan Loceng`, `Membaca: "${tid}"`, true, () => {
                playAnnouncementSequence(tid, ten);
            });
        }

        // PANGGILAN PIKET
        function openCallModal() {
            const m = document.getElementById('call-modal');
            m.classList.remove('opacity-0', 'pointer-events-none');
            m.querySelector('div').classList.remove('scale-95');
        }

        function closeCallModal() {
            const m = document.getElementById('call-modal');
            m.classList.add('opacity-0', 'pointer-events-none');
            m.querySelector('div').classList.add('scale-95');
        }

        function executeCall() {
            const role = document.getElementById('call-role').value;
            const name = document.getElementById('call-name').value.trim();
            const location = document.getElementById('call-location').value;
            
            if (!name) {
                showModal("Perhatian", "Silakan masukkan nama yang ingin dipanggil.");
                return;
            }

            let idRole = "Siswa"; let enRole = "Student";
            if (role === "guru") { idRole = "Bapak/Ibu Guru"; enRole = "Teacher"; }
            if (role === "staf") { idRole = "Staf atau Karyawan"; enRole = "Staff member"; }

            let enLocation = location;
            if (location === "Meja Piket") enLocation = "the Picket Desk";
            else if (location === "Ruang Tata Usaha") enLocation = "the Administration Office";
            else if (location === "Ruang Kepala Sekolah") enLocation = "the Principal's Office";
            else if (location === "Ruang Guru") enLocation = "the Teacher's Room";
            else if (location === "Ruang Bimbingan Konseling") enLocation = "the Counseling Room";
            else if (location === "Perpustakaan") enLocation = "the Library";
            else if (location === "UKS") enLocation = "the School Clinic";

            const textId = `Perhatian. Panggilan ditujukan kepada ${idRole} atas nama ${name}. Sekali lagi, kepada ${idRole} atas nama ${name}, harap segera menuju ke ${location} sekarang juga. Terima kasih.`;
            const textEn = `Attention please. Calling for ${enRole}, ${name}. Once again, ${enRole} ${name}, please proceed to ${enLocation} immediately. Thank you.`;

            closeCallModal();
            
            showModal(`Menyiarkan Panggilan`, `Membaca: "${textId}"`, true, () => {
                playAnnouncementSequence(textId, textEn);
            });
        }

        // --- CRUD LOGIC ---
        function renderSchedules() {
            const list = document.getElementById('schedule-list');
            const emptyState = document.getElementById('empty-state');
            list.innerHTML = '';
            
            if (schedules.length === 0) {
                list.classList.add('hidden');
                emptyState.classList.remove('hidden');
                document.getElementById('total-sched').innerText = "0";
                return;
            } else {
                list.classList.remove('hidden');
                emptyState.classList.add('hidden');
            }

            schedules.sort((a,b) => a.time.localeCompare(b.time));
            document.getElementById('total-sched').innerText = schedules.length;

            schedules.forEach(s => {
                const card = document.createElement('div');
                card.className = `bg-white border ${editingId === s.id ? 'border-blue-400 shadow-md ring-2 ring-blue-50' : 'border-slate-200 hover:border-blue-200 hover:shadow-sm'} rounded-[1.5rem] p-4 lg:p-5 transition-all flex flex-col justify-between`;
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-center mb-3 pb-3 border-b border-slate-100">
                            <div class="text-2xl font-black text-slate-800 font-mono-custom tracking-tight">${s.time}</div>
                            <div class="flex gap-1 flex-wrap justify-end">${s.days.map(d => `<span class="px-1.5 py-0.5 rounded bg-slate-50 text-slate-500 border border-slate-100 text-[8px] font-bold">${hariSingkat[d]}</span>`).join('')}</div>
                        </div>
                        <div class="space-y-2 mb-4">
                            <div class="flex gap-2 items-start"><span class="text-[10px] mt-0.5">🇮🇩</span><p class="text-[11px] font-bold text-slate-600 leading-snug line-clamp-2">"${s.textId || '-'}"</p></div>
                            <div class="flex gap-2 items-start"><span class="text-[10px] mt-0.5 opacity-60">🇬🇧</span><p class="text-[11px] font-medium text-slate-400 leading-snug line-clamp-2 italic">"${s.textEn || '-'}"</p></div>
                        </div>
                    </div>
                    <div class="flex gap-2 mt-auto">
                        <button onclick="previewSchedule(${s.id})" class="flex-1 py-2 bg-blue-50 text-blue-600 rounded-xl text-[10px] font-extrabold hover:bg-blue-600 hover:text-white transition shadow-sm uppercase tracking-wider">Tes</button>
                        <button onclick="editSchedule(${s.id})" class="flex-1 py-2 bg-slate-100 text-slate-600 rounded-xl text-[10px] font-extrabold hover:bg-slate-800 hover:text-white transition shadow-sm uppercase tracking-wider">Edit</button>
                        <button onclick="confirmDelete(${s.id})" class="w-10 flex justify-center items-center bg-rose-50 text-rose-500 rounded-xl hover:bg-rose-500 hover:text-white transition shadow-sm"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function saveSchedule() {
            const h = document.getElementById('hour-select').value, m = document.getElementById('minute-select').value;
            const tid = document.getElementById('input-text-id').value.trim(), ten = document.getElementById('input-text-en').value.trim();
            const days = Array.from(document.querySelectorAll('.day-cb')).filter(cb => cb.checked).map(cb => parseInt(cb.value));

            if (!tid) { showModal("Gagal", "Teks pengumuman Indonesia wajib diisi."); return; }
            if (days.length === 0) { showModal("Gagal", "Pilih sekurang-kurangnya satu hari aktif."); return; }

            if (editingId) {
                const i = schedules.findIndex(x => x.id === editingId);
                schedules[i] = {...schedules[i], time: `${h}:${m}`, textId: tid, textEn: ten, days};
                cancelEdit();
            } else {
                schedules.push({ id: Date.now(), time: `${h}:${m}`, textId: tid, textEn: ten, days });
                document.getElementById('input-text-id').value = '';
                document.getElementById('input-text-en').value = '';
            }
            localStorage.setItem('SmartBell_V17_Final', JSON.stringify(schedules));
            renderSchedules(); updateNextBellDisplay();
        }

        function editSchedule(id) {
            const s = schedules.find(x => x.id === id);
            editingId = id;
            const [h, m] = s.time.split(':');
            document.getElementById('hour-select').value = h;
            document.getElementById('minute-select').value = m;
            document.getElementById('input-text-id').value = s.textId;
            document.getElementById('input-text-en').value = s.textEn;
            document.querySelectorAll('.day-cb').forEach(cb => cb.checked = s.days.includes(parseInt(cb.value)));
            
            document.getElementById('form-title').innerHTML = `<span class="p-1.5 bg-amber-100 text-amber-600 rounded-lg"><svg class="w-4 h-4 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg></span> Update Jadwal`;
            document.getElementById('btn-save-schedule').innerText = "PERBARUI DATA";
            document.getElementById('btn-save-schedule').classList.replace('bg-blue-600', 'bg-amber-500');
            document.getElementById('btn-save-schedule').classList.replace('hover:bg-blue-700', 'hover:bg-amber-600');
            document.getElementById('btn-save-schedule').classList.replace('shadow-blue-500/30', 'shadow-amber-500/30');
            document.getElementById('btn-cancel-edit').classList.remove('hidden');
            
            document.getElementById('form-container').scrollIntoView({ behavior: 'smooth', block: 'center' });
            renderSchedules();
        }

        function cancelEdit() {
            editingId = null;
            document.getElementById('input-text-id').value = '';
            document.getElementById('input-text-en').value = '';
            document.getElementById('form-title').innerHTML = `<span class="p-1.5 bg-blue-100 text-blue-600 rounded-lg"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg></span> Buat Jadwal Baru`;
            document.getElementById('btn-save-schedule').innerText = "SIMPAN JADWAL";
            document.getElementById('btn-save-schedule').classList.replace('bg-amber-500', 'bg-blue-600');
            document.getElementById('btn-save-schedule').classList.replace('hover:bg-amber-600', 'hover:bg-blue-700');
            document.getElementById('btn-save-schedule').classList.replace('shadow-amber-500/30', 'shadow-blue-500/30');
            document.getElementById('btn-cancel-edit').classList.add('hidden');
            renderSchedules();
        }

        // --- AI TRANSLATION ---
        async function autoTranslateToEnglish() {
            const t = document.getElementById('input-text-id').value;
            if(!t) {
                showModal("Perhatian", "Sila masukkan teks Indonesia terlebih dahulu.");
                return;
            }
            
            const btn = document.getElementById('btn-translate');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = "Memproses...";
            btn.disabled = true;
            btn.classList.add('opacity-70');

            try {
                const sys = "Terjemahkan pengumuman sekolah ini ke English formal. Pendek dan padat. Tanpa markdown.";
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: t }] }], systemInstruction: { parts: [{ text: sys }] } })
                });
                const data = await res.json();
                const translated = data.candidates[0].content.parts[0].text;
                if(translated) document.getElementById('input-text-en').value = translated.trim();
            } catch(e) { 
                console.error(e);
                showModal("Ralat AI", "Gagal menghubungi Gemini AI. Sila periksa sambungan internet anda."); 
            } finally { 
                btn.innerHTML = originalHtml;
                btn.disabled = false;
                btn.classList.remove('opacity-70');
            }
        }

        // --- UTILS ---
        function showModal(title, msg, isConfirm = false, cb = null) {
            const m = document.getElementById('custom-modal');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-message').innerText = msg;
            const acts = document.getElementById('modal-actions');
            acts.innerHTML = '';
            if(isConfirm) {
                const c = document.createElement('button'); 
                c.className = "flex-1 py-3 text-[10px] font-bold text-slate-500 bg-slate-100 rounded-xl hover:bg-slate-200 transition uppercase tracking-widest"; 
                c.innerText = "BATAL"; 
                c.onclick = () => m.classList.add('opacity-0', 'pointer-events-none');
                
                const ok = document.createElement('button'); 
                ok.className = "flex-1 py-3 text-[10px] font-bold text-white bg-blue-600 rounded-xl shadow-md shadow-blue-500/30 hover:bg-blue-700 transition uppercase tracking-widest"; 
                ok.innerText = "YA"; 
                ok.onclick = () => { 
                    if(cb) cb(); 
                    m.classList.add('opacity-0', 'pointer-events-none'); 
                };
                acts.append(c, ok);
            } else {
                const ok = document.createElement('button'); 
                ok.className = "w-full py-3 text-[10px] font-bold text-white bg-blue-600 rounded-xl shadow-md shadow-blue-500/30 hover:bg-blue-700 transition uppercase tracking-widest"; 
                ok.innerText = "OK"; 
                ok.onclick = () => m.classList.add('opacity-0', 'pointer-events-none');
                acts.append(ok);
            }
            m.classList.remove('opacity-0', 'pointer-events-none');
        }

        function confirmDelete(id) { showModal("Hapus?", "Data ini akan terhapus kekal.", true, () => { schedules = schedules.filter(x => x.id !== id); localStorage.setItem('SmartBell_V17_Final', JSON.stringify(schedules)); renderSchedules(); updateNextBellDisplay(); }); }
        function confirmReset() { showModal("Reset?", "Semua jadwal akan dikosongkan.", true, () => { localStorage.removeItem('SmartBell_V17_Final'); location.reload(); }); }
        function previewSchedule(id) { 
            const s = schedules.find(x => x.id === id); 
            showModal("Pratinjau Loceng", `Membaca: "${s.textId}"`, true, () => {
                playAnnouncementSequence(s.textId, s.textEn); 
            });
        }
        function toggleFullScreen() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }

        window.onload = () => {
            initUI(); renderSchedules(); updateClock(); updateNextBellDisplay();
            if ('speechSynthesis' in window) {
                window.speechSynthesis.onvoiceschanged = loadVoices;
                setTimeout(loadVoices, 100);
            }
            document.getElementById('current-day-display').innerText = hariIndo[new Date().getDay()].toUpperCase();
        };
    </script>
</body>
</html>
