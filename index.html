<!-- 
  Vipercell Web Update v3.6
  Feature: PDF Ghost-Rendering Fix, Visible-Capture Method, & A4 Layout Hard-Lock
  Developer: Senior AI Developer Partner (Vipercell Project)
-->
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viper Bingo Digital v3.6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- PDF Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --viper-blue: #2563eb;
            --bg-gradient: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%);
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --border-color: #e2e8f0;
            --cell-bg: #f1f5f9;
        }

        .dark-theme {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #020617 100%);
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --border-color: #334155;
            --cell-bg: #0f172a;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            color: var(--text-main);
            transition: background 0.3s ease, color 0.3s ease;
        }

        .bingo-card {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .cell {
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: 800;
            font-size: 1.4rem;
            background: var(--cell-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        .cell.marked {
            background: var(--viper-blue) !important;
            color: white !important;
            border-radius: 50%;
            transform: scale(0.85);
            border: none;
            box-shadow: 0 0 15px rgba(37, 99, 235, 0.4);
        }

        .cell.free {
            background: #f59e0b;
            color: #ffffff;
            font-size: 0.7rem;
            font-weight: 900;
        }

        .header-col {
            background: var(--viper-blue);
            color: white;
            font-weight: 900;
            padding: 10px 0;
            font-size: 1.1rem;
        }

        #fullscreen-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--card-bg);
            z-index: 9999;
            padding: 1rem;
            overflow-y: auto;
        }

        body.is-fullscreen #fullscreen-overlay { display: block; }

        .tab-btn.active {
            background: var(--viper-blue);
            color: white;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(8px);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }

        /* Print Container Fix: Visible but behind everything during process */
        #print-temp-area {
            position: fixed;
            top: 0;
            left: 0;
            width: 794px; /* A4 Width */
            background: white;
            color: black;
            z-index: -50;
            opacity: 0.01;
            pointer-events: none;
        }

        .theme-toggle-btn {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- AREA CETAK SEMENTARA -->
    <div id="print-temp-area"></div>

    <!-- MODAL: SIMPAN NAMA BUKU -->
    <div id="modal-save" class="modal px-4">
        <div class="bg-white dark:bg-slate-800 w-full max-w-md p-8 rounded-3xl shadow-2xl">
            <h3 class="text-xl font-extrabold mb-2 text-slate-800 dark:text-white text-center">Simpan Koleksi</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mb-6 text-center">Beri nama untuk paket 4 kartu ini.</p>
            <input type="text" id="input-book-name" placeholder="Nama Buku..." class="w-full bg-slate-100 dark:bg-slate-700 border-2 border-slate-200 dark:border-slate-600 p-4 rounded-2xl mb-6 focus:border-blue-500 outline-none font-bold text-slate-700 dark:text-white">
            <div class="flex gap-3">
                <button onclick="closeModal('modal-save')" class="flex-1 py-4 font-bold text-slate-500 bg-slate-100 dark:bg-slate-700 rounded-2xl">Batal</button>
                <button onclick="confirmSave()" class="flex-1 py-4 font-bold text-white bg-blue-600 rounded-2xl shadow-lg">Simpan</button>
            </div>
        </div>
    </div>

    <!-- MODAL: KONFIRMASI -->
    <div id="modal-confirm" class="modal px-4">
        <div class="bg-white dark:bg-slate-800 w-full max-w-md p-8 rounded-3xl shadow-2xl text-center">
            <div id="confirm-icon" class="w-16 h-16 rounded-full flex items-center justify-center mb-6 mx-auto bg-amber-100 text-amber-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
            </div>
            <h3 id="confirm-title" class="text-xl font-extrabold mb-2 text-slate-800 dark:text-white">Konfirmasi</h3>
            <p id="confirm-msg" class="text-slate-500 dark:text-slate-400 text-sm mb-8">Apakah Anda yakin?</p>
            <div class="flex gap-3">
                <button onclick="closeModal('modal-confirm')" class="flex-1 py-4 font-bold text-slate-500 bg-slate-100 dark:bg-slate-700 rounded-2xl">Batal</button>
                <button id="confirm-action-btn" class="flex-1 py-4 font-bold text-white bg-blue-600 rounded-2xl">Lanjutkan</button>
            </div>
        </div>
    </div>

    <!-- FULLSCREEN OVERLAY -->
    <div id="fullscreen-overlay">
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 bg-white dark:bg-slate-800 p-4 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 gap-4">
            <div class="flex flex-wrap items-center gap-3">
                <div id="fs-title" class="font-extrabold text-blue-600 text-lg uppercase mr-2">Main Bingo</div>
                <button onclick="handleClearMarks('fullscreen')" class="bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-400 px-4 py-2 rounded-xl text-xs font-bold active:scale-95 transition-all">Bersihkan Tanda</button>
                <button onclick="downloadPDF(currentFullscreenBookId)" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-xs font-bold active:scale-95 transition-all shadow-md">Cetak PDF</button>
            </div>
            <button onclick="handleExitFullscreen()" class="bg-red-500 text-white px-6 py-3 rounded-xl font-bold flex items-center gap-2 active:scale-95 shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                Keluar
            </button>
        </div>
        <div id="fs-content" class="grid grid-cols-1 md:grid-cols-2 gap-6 pb-20"></div>
    </div>

    <div id="main-ui" class="max-w-7xl mx-auto">
        <!-- Main Header -->
        <header class="flex flex-col lg:flex-row justify-between items-center mb-8 gap-6 bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-sm border border-slate-200 dark:border-slate-700">
            <div class="text-center lg:text-left">
                <h1 class="text-3xl font-extrabold tracking-tighter text-blue-600 leading-none">
                    VIPER <span class="text-slate-800 dark:text-white">BINGO DIGITAL</span>
                </h1>
                <p class="text-slate-400 text-[10px] font-black uppercase tracking-[0.2em] mt-2">Vipercell Pro v3.6 • Ambon</p>
            </div>
            
            <div class="flex flex-wrap justify-center items-center gap-4">
                <button onclick="toggleTheme()" class="theme-toggle-btn p-3 rounded-2xl shadow-sm active:scale-95">
                    <svg id="theme-icon-sun" class="w-6 h-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M16.95 16.95l.707.707M7.05 7.05l.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"/></svg>
                    <svg id="theme-icon-moon" class="w-6 h-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                </button>

                <div class="flex bg-slate-100 dark:bg-slate-900 p-1.5 rounded-2xl border border-slate-200 dark:border-slate-700">
                    <button id="tab-saved-btn" onclick="switchTab('saved')" class="tab-btn px-6 py-3 rounded-xl font-bold text-slate-500 active">Koleksi</button>
                    <button id="tab-new-btn" onclick="switchTab('new')" class="tab-btn px-6 py-3 rounded-xl font-bold text-slate-500">Buat Baru</button>
                </div>
            </div>
        </header>

        <!-- VIEW: BUKU TERSIMPAN -->
        <section id="view-saved" class="mb-10">
            <div id="saved-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            <div id="empty-state" class="hidden flex flex-col items-center justify-center py-20 bg-white/30 dark:bg-slate-800/30 border-2 border-dashed border-slate-300 dark:border-slate-700 rounded-3xl text-slate-400 text-center">
                <p class="font-bold">Belum ada koleksi buku bingo</p>
            </div>
        </section>

        <!-- VIEW: DRAFT BARU -->
        <section id="view-new" class="hidden">
            <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4 bg-white dark:bg-slate-800 p-4 rounded-2xl border border-slate-200 dark:border-slate-700">
                <div class="flex items-center gap-3">
                    <span class="bg-amber-100 text-amber-700 px-3 py-1 rounded-lg text-[10px] font-black uppercase">Draft Mode</span>
                    <button onclick="handleClearMarks('draft')" class="text-blue-600 text-xs font-bold hover:underline">Bersihkan Tanda</button>
                </div>
                <div class="flex gap-2">
                    <button onclick="handleRequestNew()" class="bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 px-4 py-2 rounded-xl font-bold text-sm">Acak Baru</button>
                    <button onclick="openSaveModal()" class="bg-green-600 text-white px-6 py-2 rounded-xl font-bold text-sm shadow-md">Simpan Koleksi</button>
                </div>
            </div>
            <div id="new-draft-container" class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12"></div>
        </section>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-8 py-4 rounded-2xl shadow-2xl opacity-0 pointer-events-none transition-all duration-300 font-black z-[10001] uppercase tracking-widest text-xs">Notifikasi</div>

    <script>
        const STORAGE_KEY = 'viper_bingo_v3_6';
        const THEME_KEY = 'viper_bingo_theme';
        const SESSION_KEY = 'viper_bingo_active_session';
        
        let savedCollection = [];
        let currentDraft = [];
        let toastTimeout = null;
        let activeTab = 'saved';
        let currentFullscreenBookId = null;

        window.onload = () => {
            initTheme();
            loadCollection();
            const session = localStorage.getItem(SESSION_KEY);
            if (session) playBookFullscreen(session);
            else switchTab('saved');
        };

        function initTheme() {
            const savedTheme = localStorage.getItem(THEME_KEY) || 'light';
            if (savedTheme === 'dark') document.body.classList.add('dark-theme');
            updateThemeIcons();
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            localStorage.setItem(THEME_KEY, document.body.classList.contains('dark-theme') ? 'dark' : 'light');
            updateThemeIcons();
        }

        function updateThemeIcons() {
            const isDark = document.body.classList.contains('dark-theme');
            document.getElementById('theme-icon-sun').classList.toggle('hidden', !isDark);
            document.getElementById('theme-icon-moon').classList.toggle('hidden', isDark);
        }

        function loadCollection() {
            const data = localStorage.getItem(STORAGE_KEY);
            savedCollection = data ? JSON.parse(data) : [];
            renderSavedList();
        }

        function saveToLocalStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(savedCollection));
        }

        function showToast(msg, color = 'bg-blue-600') {
            const toast = document.getElementById('toast');
            if (toastTimeout) clearTimeout(toastTimeout);
            toast.innerText = msg;
            toast.className = `fixed bottom-10 left-1/2 -translate-x-1/2 ${color} text-white px-8 py-4 rounded-2xl shadow-2xl transition-all duration-300 font-black z-[10001] opacity-100 uppercase tracking-widest text-xs`;
            toastTimeout = setTimeout(() => { toast.classList.add('opacity-0'); }, 2000);
        }

        function switchTab(tab) {
            activeTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tab}-btn`).classList.add('active');
            document.getElementById('view-saved').classList.toggle('hidden', tab !== 'saved');
            document.getElementById('view-new').classList.toggle('hidden', tab !== 'new');
            if (tab === 'new' && currentDraft.length === 0) generateNewDraft();
            if (tab === 'saved') renderSavedList();
        }

        function getRandomNumbers(min, max, count) {
            const nums = [];
            while (nums.length < count) {
                const r = Math.floor(Math.random() * (max - min + 1)) + min;
                if (!nums.includes(r)) nums.push(r);
            }
            return nums.sort((a, b) => a - b);
        }

        function generateCardData() {
            return {
                'B': getRandomNumbers(1, 15, 5),
                'I': getRandomNumbers(16, 30, 5),
                'N': getRandomNumbers(31, 45, 5),
                'G': getRandomNumbers(46, 60, 5),
                'O': getRandomNumbers(61, 75, 5),
                'marks': []
            };
        }

        function generateNewDraft() {
            currentDraft = [generateCardData(), generateCardData(), generateCardData(), generateCardData()];
            renderDraft();
        }

        function renderDraft() {
            const container = document.getElementById('new-draft-container');
            container.innerHTML = '';
            currentDraft.forEach((data, i) => { container.appendChild(createCardHTML(data, i, false)); });
        }

        function createCardHTML(data, cardIndex, isSavedBook, bookId = null) {
            const cardWrapper = document.createElement('div');
            cardWrapper.className = 'bingo-card p-6 shadow-xl';
            let html = `
                <div class="flex justify-between items-center mb-5">
                    <span class="text-xs font-black text-slate-400 uppercase tracking-widest">KARTU #${cardIndex + 1}</span>
                    <span class="text-[9px] font-black text-white bg-blue-600 px-2 py-0.5 rounded-full">VIPER PRO</span>
                </div>
                <div class="grid grid-cols-5 gap-1.5 text-center overflow-hidden rounded-2xl border-2 border-slate-100 dark:border-slate-700 bg-white dark:bg-slate-900 shadow-inner">
                    <div class="header-col">B</div><div class="header-col">I</div><div class="header-col">N</div><div class="header-col">G</div><div class="header-col">O</div>
            `;
            for (let row = 0; row < 5; row++) {
                ['B', 'I', 'N', 'G', 'O'].forEach(col => {
                    const cellId = `cell-${isSavedBook ? bookId : 'draft'}-${cardIndex}-${col}-${row}`;
                    const isMarked = data.marks && data.marks.includes(cellId);
                    if (col === 'N' && row === 2) {
                        html += `<div class="cell free">FREE</div>`;
                    } else {
                        const num = data[col][row];
                        html += `<div id="${cellId}" class="cell ${isMarked ? 'marked' : ''}" onclick="toggleMark('${cellId}', ${cardIndex}, ${isSavedBook}, '${bookId}')">${num}</div>`;
                    }
                });
            }
            html += `</div>`;
            cardWrapper.innerHTML = html;
            return cardWrapper;
        }

        function toggleMark(id, cardIdx, isSavedBook, bookId) {
            const el = document.getElementById(id);
            if (!el) return;
            el.classList.toggle('marked');
            let targetSource = isSavedBook ? savedCollection.find(b => b.id === bookId).cards : currentDraft;
            if (!targetSource[cardIdx].marks) targetSource[cardIdx].marks = [];
            if (el.classList.contains('marked')) {
                if (!targetSource[cardIdx].marks.includes(id)) targetSource[cardIdx].marks.push(id);
            } else {
                targetSource[cardIdx].marks = targetSource[cardIdx].marks.filter(m => m !== id);
            }
            if (isSavedBook) saveToLocalStorage();
        }

        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        function showConfirmModal(title, msg, btnText, btnColor, onConfirm) {
            const modal = document.getElementById('modal-confirm');
            document.getElementById('confirm-title').innerText = title;
            document.getElementById('confirm-msg').innerText = msg;
            const btn = document.getElementById('confirm-action-btn');
            btn.innerText = btnText;
            btn.className = `flex-1 py-4 font-bold text-white rounded-2xl shadow-lg ${btnColor}`;
            btn.onclick = () => { onConfirm(); closeModal('modal-confirm'); };
            openModal('modal-confirm');
        }

        function handleClearMarks(type) {
            showConfirmModal("Bersihkan Tanda?", "Semua nomor yang ditandai akan dibuka kembali.", "Ya, Bersihkan", "bg-amber-600", () => {
                if (type === 'draft') { currentDraft.forEach(card => card.marks = []); renderDraft(); }
                else if (currentFullscreenBookId) {
                    const book = savedCollection.find(b => b.id === currentFullscreenBookId);
                    if (book) { book.cards.forEach(card => card.marks = []); saveToLocalStorage(); playBookFullscreen(currentFullscreenBookId); }
                }
                showToast("Tanda Dibersihkan", "bg-slate-600");
            });
        }

        function handleRequestNew() {
            showConfirmModal("Buku Baru?", "Data draft saat ini akan hilang.", "Ya, Acak Baru", "bg-blue-600", () => { generateNewDraft(); showToast("Draft Baru Diacak!", "bg-blue-600"); });
        }

        function handleExitFullscreen() {
            showConfirmModal("Keluar?", "Kembali ke menu utama.", "Ya, Keluar", "bg-red-500", () => { exitFullscreenMode(); });
        }

        function openSaveModal() { document.getElementById('input-book-name').value = ''; openModal('modal-save'); }

        function confirmSave() {
            const name = document.getElementById('input-book-name').value.trim();
            if (!name) return showToast("Nama buku kosong!", "bg-red-500");
            const newBook = { id: 'book-' + Date.now(), name: name, date: new Date().toLocaleDateString('id-ID'), cards: JSON.parse(JSON.stringify(currentDraft)) };
            savedCollection.unshift(newBook);
            saveToLocalStorage();
            closeModal('modal-save');
            showToast("Berhasil Disimpan!", "bg-green-600");
            switchTab('saved');
        }

        function renderSavedList() {
            const list = document.getElementById('saved-list');
            const empty = document.getElementById('empty-state');
            list.innerHTML = '';
            if (savedCollection.length === 0) { empty.classList.remove('hidden'); return; }
            empty.classList.add('hidden');
            savedCollection.forEach(book => {
                const item = document.createElement('div');
                item.className = 'bg-white dark:bg-slate-800 p-6 rounded-3xl border border-slate-200 dark:border-slate-700 shadow-sm flex flex-col gap-4';
                item.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <h4 class="font-extrabold text-slate-800 dark:text-white text-lg leading-tight">${book.name}</h4>
                            <p class="text-[10px] font-bold text-slate-400 mt-1 uppercase tracking-widest">${book.date}</p>
                        </div>
                        <div class="flex gap-1">
                            <button onclick="downloadPDF('${book.id}')" class="text-slate-300 hover:text-blue-500 p-2 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                            </button>
                            <button onclick="deleteBook('${book.id}')" class="text-slate-300 hover:text-red-500 p-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                            </button>
                        </div>
                    </div>
                    <button onclick="playBookFullscreen('${book.id}')" class="bg-blue-600 text-white font-bold py-3 rounded-xl shadow-lg active:scale-95 transition-all">Mainkan Sekarang</button>
                `;
                list.appendChild(item);
            });
        }

        function deleteBook(id) {
            showConfirmModal("Hapus Buku?", "Tindakan ini permanen.", "Ya, Hapus", "bg-red-600", () => {
                savedCollection = savedCollection.filter(b => b.id !== id);
                saveToLocalStorage();
                renderSavedList();
                showToast("Buku Dihapus", "bg-slate-700");
            });
        }

        function playBookFullscreen(bookId) {
            currentFullscreenBookId = bookId;
            const book = savedCollection.find(b => b.id === bookId);
            if (!book) return;
            localStorage.setItem(SESSION_KEY, bookId);
            document.getElementById('fs-title').innerText = book.name;
            const content = document.getElementById('fs-content');
            content.innerHTML = '';
            book.cards.forEach((card, i) => content.appendChild(createCardHTML(card, i, true, bookId)));
            document.body.classList.add('is-fullscreen');
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(() => {});
        }

        function exitFullscreenMode() {
            document.body.classList.remove('is-fullscreen');
            localStorage.removeItem(SESSION_KEY);
            if (document.exitFullscreen) document.exitFullscreen().catch(() => {});
            currentFullscreenBookId = null;
            renderSavedList();
        }

        // --- HARD-FIX PDF DOWNLOAD v3.6 ---
        async function downloadPDF(bookId) {
            const book = savedCollection.find(b => b.id === bookId);
            if (!book) return;

            showToast("Membangun PDF... Tunggu sebentar", "bg-blue-600");
            
            const printArea = document.getElementById('print-temp-area');
            printArea.innerHTML = '';
            // Force it to be in the render tree
            printArea.style.opacity = '1';
            printArea.style.zIndex = '99999'; // Bring to very front temporarily
            printArea.style.background = 'white';

            let pdfContent = `
                <div style="padding: 40px; background: white; width: 794px; min-height: 1123px; box-sizing: border-box;">
                    <div style="border-bottom: 8px solid #2563eb; padding-bottom: 20px; margin-bottom: 40px; display: flex; justify-content: space-between; align-items: flex-end;">
                        <div style="width: 65%;">
                            <h1 style="margin: 0; color: #2563eb; font-size: 36px; font-weight: 800; text-transform: uppercase;">Viper Bingo Digital</h1>
                            <p style="margin: 5px 0 0 0; color: #475569; font-size: 16px; font-weight: 700;">KOLEKSI: ${book.name.toUpperCase()}</p>
                        </div>
                        <div style="width: 35%; text-align: right;">
                            <p style="margin: 0; color: #94a3b8; font-size: 12px; font-weight: 800;">TANGGAL: ${book.date}</p>
                            <p style="margin: 2px 0 0 0; color: #2563eb; font-size: 12px; font-weight: 900;">AMBON • INDONESIA</p>
                        </div>
                    </div>

                    <table style="width: 100%; border-collapse: separate; border-spacing: 30px;">
                        <tr>
            `;

            book.cards.forEach((card, idx) => {
                if (idx > 0 && idx % 2 === 0) pdfContent += `</tr><tr>`;

                pdfContent += `
                    <td style="width: 50%; vertical-align: top; border: 4px solid #000; border-radius: 25px; padding: 20px; background: white;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                            <span style="font-size: 14px; font-weight: 800; color: #64748b;">KARTU #${idx + 1}</span>
                            <span style="font-size: 12px; font-weight: 900; color: #2563eb;">VIPERCELL PRO</span>
                        </div>
                        <table style="width: 100%; border-collapse: collapse; border: 4px solid #000;">
                            <tr style="background: #2563eb;">
                                ${['B','I','N','G','O'].map(h => `
                                    <th style="color: white; padding: 15px; font-size: 22px; font-weight: 900; text-align: center; border: 2.5px solid #000;">${h}</th>
                                `).join('')}
                            </tr>
                `;

                for (let row = 0; row < 5; row++) {
                    pdfContent += `<tr>`;
                    ['B','I','N','G','O'].forEach(col => {
                        if (col === 'N' && row === 2) {
                            pdfContent += `<td style="background: #f59e0b; color: white; padding: 16px 0; text-align: center; font-size: 14px; font-weight: 900; border: 2.5px solid #000;">FREE</td>`;
                        } else {
                            const val = card[col][row];
                            pdfContent += `<td style="padding: 16px 0; text-align: center; font-size: 28px; font-weight: 800; color: #000; background: #fff; border: 2.5px solid #000;">${val}</td>`;
                        }
                    });
                    pdfContent += `</tr>`;
                }
                pdfContent += `</table></td>`;
            });

            pdfContent += `
                        </tr>
                    </table>

                    <div style="margin-top: 60px; padding-top: 25px; border-top: 3px dashed #cbd5e1; text-align: center;">
                        <p style="color: #94a3b8; font-size: 14px; font-weight: 800; letter-spacing: 2px;">© 2024 VIPERCELL DIGITAL ENTERTAINMENT • AMBON PROUD</p>
                    </div>
                </div>
            `;

            printArea.innerHTML = pdfContent;

            // Wait for DOM to actually draw
            await new Promise(r => setTimeout(r, 800));

            const opt = {
                margin: 0,
                filename: `Viper_Bingo_${book.name.replace(/\s+/g, '_')}.pdf`,
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { 
                    scale: 1, // High precision but standard size
                    useCORS: true,
                    backgroundColor: '#ffffff',
                    scrollX: 0,
                    scrollY: 0
                },
                jsPDF: { unit: 'px', format: [794, 1123], orientation: 'portrait' }
            };

            try {
                const worker = html2pdf().set(opt).from(printArea);
                await worker.save();
                showToast("PDF Berhasil Diunduh!", "bg-green-600");
            } catch (error) {
                showToast("Gagal memproses PDF", "bg-red-600");
                console.error(error);
            } finally {
                printArea.style.opacity = '0.01';
                printArea.style.zIndex = '-50';
                printArea.innerHTML = '';
            }
        }

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                document.body.classList.remove('is-fullscreen');
                localStorage.removeItem(SESSION_KEY);
                currentFullscreenBookId = null;
            }
        });
    </script>
</body>
</html>
